services:
  django:
    build: .
    image: stay-hr-django:latest
    container_name: stay_django
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/media:/app/backend/media
      - ./hospira-fc0dc-f77596470912.json:/run/secrets/firebase-service-account.json:ro
    networks:
      postgis: {}
      proxy: {}
      hetzner_net: {}
      stay_internal:
        aliases:
          - stay-django
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # API
      - traefik.http.routers.stay-api.rule=Host(`api.stay.hr`)
      - traefik.http.routers.stay-api.entrypoints=websecure
      - traefik.http.routers.stay-api.tls=true
      - traefik.http.routers.stay-api.tls.certresolver=cloudflare
      - traefik.http.routers.stay-api.service=stay-django
      - traefik.http.routers.stay-api.priority=100
      # Admin (same backend)
      - traefik.http.routers.stay-admin.rule=Host(`admin.stay.hr`)
      - traefik.http.routers.stay-admin.entrypoints=websecure
      - traefik.http.routers.stay-admin.tls=true
      - traefik.http.routers.stay-admin.tls.certresolver=cloudflare
      - traefik.http.routers.stay-admin.service=stay-django
      - traefik.http.routers.stay-admin.priority=100
      - traefik.http.services.stay-django.loadbalancer.server.port=8000

  celery-worker:
    build: .
    image: stay-hr-django:latest
    container_name: stay_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/media:/app/backend/media
      - ./hospira-fc0dc-f77596470912.json:/run/secrets/firebase-service-account.json:ro
    networks:
      - postgis
      - stay_internal
      - hetzner_net
    command: ["celery", "-A", "config", "worker", "-l", "info"]

  celery-beat:
    build: .
    image: stay-hr-django:latest
    container_name: stay_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./hospira-fc0dc-f77596470912.json:/run/secrets/firebase-service-account.json:ro
    networks:
      - postgis
      - stay_internal
      - hetzner_net
    command: ["celery", "-A", "config", "beat", "-l", "info"]

  web-booking:
    build:
      context: ./web/booking
    image: stay-hr-web-booking:latest
    container_name: stay_web_booking
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STAY_API_INTERNAL_URL: http://stay-django:8000
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - proxy
      - stay_internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.stay-web-booking.loadbalancer.server.port=3000
      - traefik.http.routers.stay-booking-tenant.rule=HostRegexp(`^[a-z0-9-]+\.stay\.hr$`)
      - traefik.http.routers.stay-booking-tenant.entrypoints=websecure
      - traefik.http.routers.stay-booking-tenant.tls=true
      - traefik.http.routers.stay-booking-tenant.tls.certresolver=cloudflare
      - traefik.http.routers.stay-booking-tenant.service=stay-web-booking
      - traefik.http.routers.stay-booking-tenant.priority=50
      - traefik.http.routers.stay-booking-apex.rule=Host(`stay.hr`) || Host(`www.stay.hr`)
      - traefik.http.routers.stay-booking-apex.entrypoints=websecure
      - traefik.http.routers.stay-booking-apex.tls=true
      - traefik.http.routers.stay-booking-apex.tls.certresolver=cloudflare
      - traefik.http.routers.stay-booking-apex.service=stay-web-booking
      - traefik.http.routers.stay-booking-apex.priority=110
      - traefik.http.routers.stay-booking-uzorita.rule=Host(`booking.uzorita.hr`)
      - traefik.http.routers.stay-booking-uzorita.entrypoints=websecure
      - traefik.http.routers.stay-booking-uzorita.tls=true
      - traefik.http.routers.stay-booking-uzorita.tls.certresolver=cloudflare
      - traefik.http.routers.stay-booking-uzorita.service=stay-web-booking

  web-reception:
    build:
      context: ./web/reception
    image: stay-hr-web-reception:latest
    container_name: stay_web_reception
    restart: unless-stopped
    environment:
      STAY_API_INTERNAL_URL: http://stay-django:8000
      STAY_RECEPTION_HOST: app.stay.hr
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - proxy
      - stay_internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.stay-web-reception.loadbalancer.server.port=3000
      - traefik.http.routers.stay-reception.rule=Host(`app.stay.hr`)
      - traefik.http.routers.stay-reception.entrypoints=websecure
      - traefik.http.routers.stay-reception.tls=true
      - traefik.http.routers.stay-reception.tls.certresolver=cloudflare
      - traefik.http.routers.stay-reception.service=stay-web-reception
      - traefik.http.routers.stay-reception.priority=100

networks:
  stay_internal:
    name: stay_internal
    driver: bridge
  postgis:
    external: true
  proxy:
    external: true
  hetzner_net:
    external: true
